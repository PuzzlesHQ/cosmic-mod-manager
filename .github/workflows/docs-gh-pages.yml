name: Publish docs to gh pages

on:
  push:
    branches: ["main"]
    paths:
      - "apps/docs/**"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy-gh-pages:
    uses: Abhinav5383/gh-workflows/.github/workflows/vite-gh-pages.yml@master
    with:
      project_loc: "apps/docs"
      build_dir: ".vitepress/dist"